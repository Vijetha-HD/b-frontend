name: 🚀 Deploy Bright Laptop Admin

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 📄 Create .env file
        run: echo "${{ secrets.ENV_FILE }}" > .env

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🏗️ Build app
        run: npm run build

      # 🔥 CLEAN OLD FILES
      - name: 🧹 Clean EC2 folder
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            rm -rf /home/ubuntu/b-frontend/brightLaptopAdmin-main/*

      # 🚀 DEPLOY NEW FILES
      - name: 📂 Upload dist
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          source: "dist/*"
          target: "/home/ubuntu/b-frontend/brightLaptopAdmin-main"
          strip_components: 1
          overwrite: true

      # 🔁 RELOAD NGINX (IMPORTANT)
      - name: 🔁 Reload Nginx
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            sudo systemctl reload nginx
